<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>An-Q</title>
  <script>
    // GitHub Pages SPA ルーティング対応
    // /An-Q/some/path → /An-Q/?p=/some/path にリダイレクトして index.html に渡す
    (function() {
      var base = '/An-Q';
      var path = window.location.pathname;
      // すでに /An-Q/ 配下でない場合はそのままリダイレクト
      if (path === base || path === base + '/') {
        window.location.replace(base + '/');
        return;
      }
      // /An-Q/xxx のサブパスをクエリパラメータに変換して index.html に渡す
      var subPath = path.startsWith(base) ? path.slice(base.length) : path;
      var search = window.location.search;
      var hash = window.location.hash;
      var redirectUrl = base + '/?p=' + encodeURIComponent(subPath + search) + hash;
      window.location.replace(redirectUrl);
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="/An-Q/">An-Q</a>...</p>
</body>
</html>
