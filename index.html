    <!-- GitHub Pages SPA: 404.html から渡されたパスを history に復元 -->
    <!-- Expo Router が初期化される前に URL を正しいパスに戻す必要がある -->
    <script>
      (function() {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
          var base = '/An-Q';
          var decoded = decodeURIComponent(p);
          var newUrl = base + decoded;
          window.history.replaceState(null, '', newUrl);
        }
      })();
    </script>
