<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>An-Q</title>
  <script>
    // GitHub Pages SPA ルーティング対応
    // /An-Q/ へのアクセスはすべて index.html に渡す
    (function() {
      var base = '/An-Q';
      var pathname = window.location.pathname;

      // /An-Q または /An-Q/ へのアクセスはそのまま index.html にリダイレクト
      if (pathname === base || pathname === base + '/') {
        window.location.replace(base + '/');
        return;
      }

      // /An-Q/xxx のサブパスをクエリパラメータに変換して index.html に渡す
      // これにより Expo Router が正しいルートを解決できる
      var subPath = pathname.startsWith(base) ? pathname.slice(base.length) : pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var redirectUrl = base + '/?p=' + encodeURIComponent(subPath + search) + hash;
      window.location.replace(redirectUrl);
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="/An-Q/">An-Q</a>...</p>
</body>
</html>
